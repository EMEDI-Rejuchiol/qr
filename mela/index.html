<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language Select</title>
  <style>
    body { text-align:center; padding:40px; font-family:sans-serif; }
    .btn {
      display:block;
      margin:10px auto;
      padding:15px;
      width:200px;
      border:1px solid #ccc;
      border-radius:10px;
      font-size:18px;
      background:white;
    }
  </style>
</head>
<body>

<h2>언어를 선택해주세요</h2>
<p>Please select your language</p>

<button class="btn" onclick="go('kr.html')">한국어</button>
<button class="btn" onclick="go('en.html')">English</button>
<button class="btn" onclick="go('jp.html')">日本語</button>
<button class="btn" onclick="go('cn.html')">简体中文</button>

<script>
function go(page){
  location.href = page;
}
</script>

</body>
</html>
